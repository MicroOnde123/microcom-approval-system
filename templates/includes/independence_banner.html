{% load i18n static %}

<section class="independence-banner" aria-labelledby="independence-banner-title">
    <div class="independence-banner__content">
        <div class="independence-banner__logo-card">
            <img
                src="{% static 'images/microcom_logo.png' %}"
                alt="{% trans 'Microcom logo' %}"
                class="independence-banner__logo"
            >
        </div>

        <div class="independence-banner__copy">
            <h1 id="independence-banner-title">
                {% trans "Happy Congolese Independence Day — June 30, 2026" %}
            </h1>
            <p>{% trans "Microcom Approval & Workflow System" %}</p>
        </div>
    </div>
</section>
