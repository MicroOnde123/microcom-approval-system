{% load i18n %}
{% trans "No materials found." as no_materials_found %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const addButton = document.getElementById("add-material-btn");
    const container = document.getElementById("material-items");
    const totalForms = document.getElementById("id_material_items-TOTAL_FORMS");
    const initialForms = document.getElementById("id_material_items-INITIAL_FORMS");
    const templateElement = document.getElementById("empty-material-template");
    const categoryFilter = document.getElementById("material-category-filter");
    const noMaterialsFoundText = "{{ no_materials_found|escapejs }}";

    if (!addButton || !container || !totalForms || !initialForms || !templateElement || !categoryFilter) {
        return;
    }

    // The partial is shared by create and edit pages. Guard the formset itself so
    // an accidental second script include cannot bind Add/Remove handlers twice.
    if (container.dataset.formsetInitialized === "true") {
        return;
    }
    container.dataset.formsetInitialized = "true";

    function getOptionsForRow(row) {
        const select = row.querySelector('select[name$="-material"]');

        if (!select) {
            return [];
        }

        return Array.from(select.options)
            .filter(function (option) {
                return option.value;
            })
            .map(function (option) {
                return {
                    value: option.value,
                    text: option.text
                };
            });
    }

    function renderMaterialResults(row) {
        const input = row.querySelector(".material-search-field");
        const results = row.querySelector(".material-results");
        const select = row.querySelector('select[name$="-material"]');

        if (!input || !results || !select || row.hidden) {
            return;
        }

        const searchText = input.value.toLowerCase().trim();
        const selectedCategory = categoryFilter.value;
        const selectedCategoryText = selectedCategory
            ? categoryFilter.options[categoryFilter.selectedIndex].text.toLowerCase()
            : "";
        const matches = getOptionsForRow(row).filter(function (item) {
            const text = item.text.toLowerCase();
            const matchesSearch = !searchText || text.includes(searchText);
            const matchesCategory = !selectedCategory || text.includes(selectedCategoryText);
            return matchesSearch && matchesCategory;
        }).slice(0, 20);

        results.innerHTML = "";

        if (!matches.length) {
            const emptyResult = document.createElement("div");
            emptyResult.className = "material-result-item material-result-muted";
            emptyResult.textContent = noMaterialsFoundText;
            results.appendChild(emptyResult);
            results.style.display = "block";
            return;
        }

        matches.forEach(function (item) {
            const result = document.createElement("div");
            result.className = "material-result-item";
            result.textContent = item.text;

            result.addEventListener("click", function () {
                select.value = item.value;
                select.dispatchEvent(new Event("change", { bubbles: true }));
                input.value = item.text;
                results.style.display = "none";
            });

            results.appendChild(result);
        });

        results.style.display = "block";
    }

    function initializeMaterialRow(row) {
        if (row.dataset.materialRowInitialized === "true") {
            return;
        }

        const input = row.querySelector(".material-search-field");
        const results = row.querySelector(".material-results");
        const select = row.querySelector('select[name$="-material"]');
        const deleteInput = row.querySelector('input[name$="-DELETE"]');

        if (!input || !results || !select) {
            return;
        }

        row.dataset.materialRowInitialized = "true";

        if (deleteInput && deleteInput.checked) {
            row.hidden = true;
        }

        const selectedOption = select.options[select.selectedIndex];
        if (selectedOption && selectedOption.value) {
            input.value = selectedOption.text;
        }

        input.addEventListener("input", function () {
            select.value = "";
            renderMaterialResults(row);
        });

        input.addEventListener("focus", function () {
            renderMaterialResults(row);
        });

        input.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                results.style.display = "none";
            }
        });
    }

    function addMaterialRow() {
        // Form indexes are never reused. TOTAL_FORMS advances only here, which
        // keeps every newly added row's field names unique after removals.
        const formIndex = parseInt(totalForms.value, 10);
        const newFormHtml = templateElement.innerHTML.replace(/__prefix__/g, formIndex);

        container.insertAdjacentHTML("beforeend", newFormHtml);
        totalForms.value = formIndex + 1;

        const newRow = container.lastElementChild;
        initializeMaterialRow(newRow);
        newRow.querySelector(".material-search-field").focus();
    }

    function getFormIndex(row) {
        const field = row.querySelector('[name^="material_items-"]');
        const match = field ? field.name.match(/^material_items-(\d+)-/) : null;
        return match ? parseInt(match[1], 10) : null;
    }

    container.addEventListener("click", function (event) {
        const removeButton = event.target.closest(".remove-material-btn");

        if (!removeButton) {
            return;
        }

        event.preventDefault();
        event.stopPropagation();

        const row = removeButton.closest(".material-line");
        const formIndex = getFormIndex(row);
        const deleteInput = row.querySelector('input[name$="-DELETE"]');

        // Django must receive DELETE for database-backed initial forms. Extra
        // forms (including rows added in this browser session) have no saved
        // object, so remove them from the DOM instead of leaving hidden ghosts.
        if (deleteInput && formIndex !== null && formIndex < parseInt(initialForms.value, 10)) {
            deleteInput.checked = true;
            row.hidden = true;
            return;
        }

        row.remove();
    });

    document.addEventListener("click", function (event) {
        if (!event.target.closest(".material-picker")) {
            document.querySelectorAll(".material-results").forEach(function (results) {
                results.style.display = "none";
            });
        }
    });

    categoryFilter.addEventListener("change", function () {
        const focusedRow = document.activeElement.closest
            ? document.activeElement.closest(".material-line")
            : null;

        if (focusedRow) {
            renderMaterialResults(focusedRow);
        }
    });

    addButton.addEventListener("click", addMaterialRow);
    container.querySelectorAll(".material-line").forEach(initializeMaterialRow);
});
</script>
