{% load i18n %}
<!DOCTYPE html>
<html>

<head>
    <title>{% trans "Bulk Material Print" %}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: #111827;
            margin: 30px;
            background: #ffffff;
        }

        .top-actions {
            margin-bottom: 20px;
        }

        .btn {
            background: #123d6b;
            color: white;
            border: none;
            padding: 9px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .print-sheet {
            max-width: 1000px;
            margin: 0 auto 30px;
            page-break-after: always;
            break-after: page;
        }

        .print-sheet:last-of-type {
            page-break-after: auto;
            break-after: auto;
        }

        .document {
            border: 2px solid #111827;
            padding: 24px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 2px solid #111827;
            padding-bottom: 14px;
            margin-bottom: 24px;
        }

        .company-title {
            font-size: 18px;
            font-weight: 700;
        }

        .doc-meta {
            text-align: right;
            font-size: 13px;
        }

        .main-title {
            text-align: center;
            margin: 24px 0;
            text-transform: uppercase;
            font-size: 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 22px;
        }

        th,
        td {
            border: 1px solid #374151;
            padding: 9px;
            font-size: 14px;
            vertical-align: top;
        }

        th {
            background: #f3f4f6;
            text-align: left;
        }

        .section-title {
            margin-top: 24px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            border-left: 5px solid #123d6b;
            padding-left: 10px;
        }

        .notes-box {
            border: 1px solid #374151;
            min-height: 60px;
            padding: 12px;
            margin-bottom: 22px;
            white-space: pre-wrap;
        }

        @page {
            size: A4 portrait;
            margin: 8mm;
        }

        @media print {
            html,
            body {
                width: 194mm;
                margin: 0;
                padding: 0;
            }

            .top-actions {
                display: none;
            }

            .print-sheet {
                width: 194mm;
                min-height: 281mm;
                max-width: none;
                margin: 0;
                page-break-after: always;
                break-after: page;
            }

            .print-sheet:last-of-type {
                page-break-after: auto;
                break-after: auto;
            }

            .document {
                padding: 4mm;
                min-height: 281mm;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .company-header {
                gap: 4mm;
                padding-bottom: 2mm;
                margin-bottom: 2mm;
                border-bottom-width: 1px;
            }

            .company-title {
                font-size: 13px;
            }

            .doc-meta {
                font-size: 9px;
            }

            .main-title {
                font-size: 15px;
                margin: 3mm 0;
                letter-spacing: 0;
            }

            .section-title {
                margin-top: 2mm;
                margin-bottom: 1mm;
                font-size: 10px;
                border-left-width: 2px;
                padding-left: 2mm;
            }

            table {
                margin-bottom: 2mm;
            }

            th,
            td {
                padding: 1mm;
                font-size: 9px;
                line-height: 1.2;
            }

            .notes-box {
                min-height: 14mm;
                padding: 1.5mm;
                margin-bottom: 2mm;
                font-size: 9px;
                line-height: 1.2;
            }
        }
    </style>
</head>

<body>
    <div class="top-actions">
        <button class="btn" onclick="window.print()">{% trans "Print / Save as PDF" %}</button>
        <a href="{{ back_url }}" class="btn">{% trans "Back" %}</a>
    </div>

    {% for req in requests %}
    <div class="print-sheet">
        {% include "requests_app/partials/bulk_material_document_copy.html" %}
    </div>
    {% empty %}
    <p>{% trans "No selected documents found." %}</p>
    {% endfor %}
</body>

</html>
