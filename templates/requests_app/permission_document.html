{% load i18n %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% trans "Permission Document" %} - {{ request_obj.request_number }}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            color: #111827;
            background: #ffffff;
        }

        .print-actions {
            margin-bottom: 20px;
        }

        .print-actions button {
            background: #123d6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
        }

        .print-sheet {
            max-width: 1000px;
            margin: 0 auto;
        }

        .half-copy {
            border: 2px solid #111827;
            margin-bottom: 18px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .cut-line {
            border-top: 2px dashed #111827;
            margin: 18px 0;
            height: 1px;
        }

        .document-box {
            padding: 24px;
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 2px solid #111827;
            padding-bottom: 14px;
            margin-bottom: 24px;
        }

        .company-title {
            font-size: 18px;
            font-weight: 700;
        }

        .doc-meta {
            text-align: right;
            font-size: 13px;
        }

        .main-title {
            text-align: center;
            margin: 24px 0;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            margin-top: -12px;
            margin-bottom: 24px;
            color: #4b5563;
            font-size: 14px;
        }

        .info-table,
        .approval-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 22px;
        }

        .info-table th,
        .info-table td,
        .approval-table th,
        .approval-table td {
            border: 1px solid #374151;
            padding: 9px;
            font-size: 14px;
            vertical-align: top;
        }

        .info-table th,
        .approval-table th {
            background: #f3f4f6;
            text-align: left;
            width: 28%;
        }

        .section-title {
            margin-top: 24px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            border-left: 5px solid #123d6b;
            padding-left: 10px;
        }

        .reason-box {
            border: 1px solid #374151;
            min-height: 70px;
            padding: 12px;
            margin-bottom: 22px;
            white-space: pre-wrap;
        }

        .approval-note {
            font-size: 12px;
            color: #4b5563;
            margin-top: 8px;
        }

        @page {
            size: A4 portrait;
            margin: 8mm;
        }

        @media print {
            html,
            body {
                width: 194mm;
                margin: 0;
                padding: 0;
            }

            .print-actions {
                display: none;
            }

            .print-sheet {
                width: 194mm;
                height: 281mm;
                max-width: none;
                margin: 0;
            }

            .half-copy {
                height: 136mm;
                margin: 0;
                overflow: hidden;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .cut-line {
                height: 9mm;
                margin: 0;
                border-top: 2px dashed #111827;
            }

            .document-box {
                padding: 4mm;
            }

            .company-header {
                gap: 4mm;
                padding-bottom: 2mm;
                margin-bottom: 2mm;
                border-bottom-width: 1px;
            }

            .company-title {
                font-size: 10px;
            }

            .doc-meta,
            .subtitle,
            .approval-note {
                font-size: 7px;
            }

            .main-title {
                font-size: 12px;
                margin: 2mm 0 1mm;
                letter-spacing: 0;
            }

            .subtitle {
                margin: 0 0 2mm;
            }

            .section-title {
                margin-top: 2mm;
                margin-bottom: 1mm;
                font-size: 8px;
                border-left-width: 2px;
                padding-left: 2mm;
            }

            .info-table,
            .approval-table {
                margin-bottom: 2mm;
            }

            .info-table th,
            .info-table td,
            .approval-table th,
            .approval-table td {
                padding: 1mm;
                font-size: 7px;
                line-height: 1.15;
            }

            .reason-box {
                min-height: 9mm;
                padding: 1.5mm;
                margin-bottom: 2mm;
                font-size: 7px;
                line-height: 1.15;
            }

            .approval-note {
                margin: 1mm 0 0;
            }
        }
    </style>
</head>

<body>
    <div class="print-actions">
        <button onclick="window.print()">{% trans "Print / Save PDF" %}</button>
    </div>

    <div class="print-sheet">
        <div class="half-copy">
            {% include "requests_app/partials/permission_document_copy.html" %}
        </div>
        <div class="cut-line"></div>
        <div class="half-copy">
            {% include "requests_app/partials/permission_document_copy.html" %}
        </div>
    </div>
</body>

</html>
