{% load i18n %}
<!DOCTYPE html>
<html lang="{% get_current_language as LANGUAGE_CODE %}{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% trans "Login" %} - {% trans "Microcom Approval System" %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 360px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #1f4f82;
        }

        form p {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        input:focus {
            outline: 2px solid rgba(31,79,130,0.25);
            border-color: #1f4f82;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1f4f82;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
        }

        button:hover {
            background: #163a60;
        }

        .errorlist {
            color: #b91c1c;
            list-style: none;
            padding: 0;
            margin-bottom: 10px;
        }

        .helptext {
            display: none;
        }

        .forgot-link {
            display: block;
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
            color: #1f4f82;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>{% trans "Microcom Approval System" %}</h2>

        

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                {% trans "Login" %}
            </button>

            <a href="{% url 'password_reset' %}" class="forgot-link">
                {% trans "Forgot Password?" %}
            </a>

        </form>

    </div>

</body>

</html>
