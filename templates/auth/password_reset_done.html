{% load i18n %}
<!DOCTYPE html>
<html lang="{% get_current_language as LANGUAGE_CODE %}{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% trans "Password Reset Sent" %} - {% trans "Microcom Approval System" %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 360px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #1f4f82;
        }

        .message {
            color: #4b5563;
            line-height: 1.6;
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: #1f4f82;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>{% trans "Password Reset Sent" %}</h2>

        <p class="message">
            {% trans "A password reset link has been sent. Please check your email or console output." %}
        </p>

        <a href="{% url 'login' %}" class="back-link">
            {% trans "Back to Login" %}
        </a>

    </div>

</body>

</html>
