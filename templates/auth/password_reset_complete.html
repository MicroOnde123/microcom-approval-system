{% load i18n %}
<!DOCTYPE html>
<html lang="{% get_current_language as LANGUAGE_CODE %}{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Password Set" %} - {% trans "Microcom Approval System" %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 360px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #1f4f82;
        }

        .message {
            color: #4b5563;
            line-height: 1.6;
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .login-link {
            display: block;
            width: 100%;
            padding: 12px;
            background: #1f4f82;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            box-sizing: border-box;
        }

        .login-link:hover {
            background: #163a60;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>{% trans "Password Set" %}</h2>

        <p class="message">
            {% trans "Your password has been set successfully. You can now log in." %}
        </p>

        <a href="{% url 'login' %}" class="login-link">
            {% trans "Back to Login" %}
        </a>

    </div>

</body>

</html>
